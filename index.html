<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>まさつざい伝説</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#5a0a0a; --bg2:#060101; --win-bg:#0b0708; --frame:#ffffff;
    --gold:#f4d24c; --ink:#fff; --muted:#d8c8c8; --bad:#ff6060; --good:#5fe06a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:'DotGothic16',sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:radial-gradient(circle at 50% 28%,#6a0c0c 0%,#350606 45%,#0a0202 80%,#060101 100%);
    color:var(--ink);display:flex;align-items:center;justify-content:center;overflow:hidden;-webkit-font-smoothing:none;}
  #stage{width:min(100vw,520px);height:min(100vh,880px);height:min(100dvh,880px);position:relative;padding:10px 10px calc(12px + env(safe-area-inset-bottom)) 10px;display:flex;flex-direction:column;}
  .win{background:var(--win-bg);border:3px solid var(--frame);
    box-shadow:0 0 0 3px #000,inset 0 0 0 2px #000;padding:14px;position:relative;}
  .win+.win{margin-top:10px;}
  h1,h2{margin:0;line-height:1.5;font-weight:400;}
  .title-jp{font-size:clamp(32px,11vw,54px);letter-spacing:2px;text-align:center;color:var(--gold);
    text-shadow:3px 0 #000,-3px 0 #000,0 3px #000,0 -3px #000,5px 5px 0 #7a1010,8px 8px 0 #000;
    animation:titlebob 1.6s ease-in-out infinite;}
  @keyframes titlebob{50%{transform:scale(1.03);}}
  #logo{text-align:center;animation:titlebob 1.8s ease-in-out infinite;}
  #logo svg{max-width:100%;height:auto;}
  .tagline{text-align:center;color:#ff8a6a;font-size:12px;letter-spacing:1px;margin-top:4px;text-shadow:1px 1px 0 #000;}
  .intro-box{height:82px;overflow:hidden;}
  .intro{font-size:14px;line-height:1.85;text-align:center;color:var(--muted);letter-spacing:.3px;margin:0;white-space:pre-wrap;}
  .intro .q{color:#fff;text-shadow:1px 1px 0 #000;}
  .intro .punch{color:#fff;font-size:15px;letter-spacing:.5px;text-shadow:0 0 8px #ff3a3a,2px 2px 0 #000;}
  .brake-anim{display:flex;justify-content:center;margin-top:6px;}
  .brake-frame{display:block;width:124px;height:124px;object-fit:cover;border:3px solid #fff;box-shadow:0 0 0 2px #000,0 0 14px rgba(0,0,0,.6);background:#0a0808;}
  #rotor{transform-box:fill-box;transform-origin:center;animation:rotorSpin 4.2s linear infinite;}
  @keyframes rotorSpin{0%{transform:rotate(0deg);}33%{transform:rotate(560deg);}46%{transform:rotate(620deg);}66%{transform:rotate(620deg);}100%{transform:rotate(1080deg);}}
  .caliper-pad{transform-box:fill-box;animation:padClamp 4.2s ease-in-out infinite;}
  @keyframes padClamp{0%,28%{transform:translateY(0);}40%,64%{transform:translateY(7px);}76%,100%{transform:translateY(0);}}
  .stop-spark{animation:stopSpark 4.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes stopSpark{0%,40%{opacity:0;transform:scale(.3);}46%,60%{opacity:1;transform:scale(1);}66%,100%{opacity:0;transform:scale(.3);}}
  h2{font-size:17px;color:var(--gold);letter-spacing:1px;}
  p,li{font-size:16px;line-height:1.9;margin:0;letter-spacing:.5px;}
  .muted{color:var(--muted);}
  .narr{min-height:1.9em;}
  ul.menu{list-style:none;margin:0;padding:0;}
  ul.menu li{padding:6px 6px 6px 30px;position:relative;cursor:pointer;font-size:18px;display:flex;align-items:center;gap:8px;}
  ul.menu li::before{content:"▶";position:absolute;left:6px;opacity:0;color:var(--ink);font-size:14px;top:50%;transform:translateY(-50%);}
  ul.menu li.sel::before{opacity:1;animation:blink .6s steps(1) infinite;}
  ul.menu li .mi{display:inline-flex;width:24px;height:24px;}
  ul.menu li .leg{color:var(--gold);text-shadow:0 0 6px #ffcf3a;}
  @keyframes blink{50%{opacity:0;}}
  .mat-desc-row{display:flex;gap:12px;align-items:center;margin-top:12px;}
  ul.cards{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px;height:100%;}
  ul.cards li{flex:1;display:flex;align-items:center;gap:14px;padding:10px 12px 10px 30px;position:relative;cursor:pointer;border:2px solid #555;background:#0e0a0b;min-height:62px;}
  ul.cards li::before{content:"▶";position:absolute;left:8px;opacity:0;color:#fff;font-size:16px;top:50%;transform:translateY(-50%);}
  ul.cards li.sel{border-color:#fff;background:#1a1012;}
  ul.cards li.sel::before{opacity:1;animation:blink .6s steps(1) infinite;}
  ul.cards li.sel.legopt{border-color:var(--gold);box-shadow:0 0 14px rgba(244,210,76,.45);}
  .card-ic{width:54px;height:54px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border:2px solid #fff;background:#000;}
  .card-ic.leg{border-color:var(--gold);box-shadow:0 0 12px var(--gold);}
  .card-tx{display:flex;flex-direction:column;gap:3px;}
  .card-tx .nm{font-size:21px;line-height:1.2;}
  .card-tx .nm.leg{color:var(--gold);text-shadow:0 0 6px #ffcf3a;}
  .card-tx .ft{font-size:13px;color:var(--muted);line-height:1.45;}
  .icon-frame{width:92px;height:92px;flex:0 0 auto;border:2px solid #fff;background:#000;display:flex;align-items:center;justify-content:center;}
  .icon-frame.leg{box-shadow:0 0 16px var(--gold);border-color:var(--gold);animation:framepulse 1.4s ease-in-out infinite;}
  @keyframes framepulse{50%{box-shadow:0 0 26px #ffe98a;}}
  .mat-desc-row .txt{font-size:14px;color:var(--muted);line-height:1.7;min-height:3.4em;}
  .mat-desc-row .txt.leg{color:var(--gold);}
  .btnrow{display:flex;gap:10px;margin-top:12px;}
  button.dq{flex:1;font-size:16px;color:var(--ink);background:#161013;border:3px solid #fff;
    box-shadow:inset 0 0 0 2px #000,3px 3px 0 #000;padding:12px;cursor:pointer;letter-spacing:1px;}
  button.dq:active{transform:translate(2px,2px);box-shadow:inset 0 0 0 2px #000,1px 1px 0 #000;}
  button.dq.primary{background:#3a0e0e;}
  .slider-block{margin:14px 0;}
  .mix-ic{display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .mix-ic .nm{font-size:15px;}
  .mix-ic .nm.leg{color:var(--gold);text-shadow:0 0 6px #ffcf3a;}
  .slider-head{display:flex;justify-content:space-between;align-items:center;font-size:15px;}
  .slider-head .val{font-size:14px;color:var(--gold);}
  input[type=range]{-webkit-appearance:none;width:100%;height:18px;margin:6px 0;background:transparent;cursor:pointer;}
  input[type=range]::-webkit-slider-runnable-track{height:14px;background:#000;border:2px solid #888;}
  input[type=range]::-moz-range-track{height:14px;background:#000;border:2px solid #888;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:24px;background:#fff;border:2px solid #000;margin-top:-7px;box-shadow:1px 1px 0 #000;}
  input[type=range]::-moz-range-thumb{width:14px;height:22px;background:#fff;border:2px solid #000;border-radius:0;}
  .hint{font-size:13px;color:var(--muted);min-height:1.4em;margin-top:2px;}
  .hint.warn{color:var(--bad);}
  .scale{display:flex;justify-content:space-between;font-size:11px;color:#bda;opacity:.7;}
  .radar-wrap{display:flex;justify-content:center;}
  svg{display:block;}
  .pad-stage{display:flex;justify-content:center;align-items:center;height:148px;}
  #pad,#pad-thanks{width:100%;text-align:center;}
  #pad svg,#pad-thanks svg{margin:0 auto;}
  #pad.legend-float,#pad-thanks.legend-float{animation:floaty 1.8s ease-in-out infinite;}
  @keyframes floaty{50%{transform:translateY(-7px);}}
  .steam{animation:steam 2.1s ease-in-out infinite;transform-box:fill-box;}
  .steam2{animation:steam 2.1s ease-in-out .7s infinite;transform-box:fill-box;}
  @keyframes steam{0%{opacity:0;transform:translateY(6px);}45%{opacity:.75;}100%{opacity:0;transform:translateY(-16px);}}
  .smoke{animation:smoke 3s ease-in-out infinite;transform-box:fill-box;}
  .smoke2{animation:smoke 3s ease-in-out 1s infinite;transform-box:fill-box;}
  @keyframes smoke{0%{opacity:0;transform:translateY(8px) scale(.7);}40%{opacity:.6;}100%{opacity:0;transform:translateY(-22px) scale(1.3);}}
  .aura{animation:aura 2.2s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes aura{50%{opacity:.35;transform:scale(1.1);}}
  .gem{animation:tw 1.1s steps(2) infinite;transform-box:fill-box;}
  @keyframes tw{50%{opacity:.25;}}
  .lstar{animation:tw2 1.6s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
  @keyframes tw2{0%,100%{opacity:.3;transform:scale(.6);}50%{opacity:1;transform:scale(1.1);}}
  .heatwave{animation:hw 1.3s ease-in-out infinite;transform-box:fill-box;}
  @keyframes hw{50%{transform:translateY(-4px);opacity:.4;}}
  .flame{animation:flick .25s steps(2) infinite;transform-box:fill-box;transform-origin:bottom;}
  @keyframes flick{50%{transform:scaleY(.86) scaleX(1.06);}}
  .comments p{margin:3px 0;font-size:16px;line-height:1.95;}
  .comments p.leg{color:var(--gold);text-shadow:0 0 6px #ffcf3a;}
  .comments p.legwarn{color:#ffb04a;text-shadow:0 0 6px #ff7a1a;font-size:15px;}
  .comments p.bad{color:var(--bad);}
  .comments p.summary{color:#fff;background:#1c1012;border-left:3px solid var(--gold);padding:2px 8px;text-shadow:0 0 4px #ffcf3a;}
  /* ritual press scene */
  .press-scene{position:relative;height:230px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .machine{position:relative;width:170px;height:160px;z-index:3;}
  .platen{position:absolute;left:0;width:170px;height:48px;background:#15161c;border:3px solid #fff;box-shadow:inset 0 0 0 2px #000;z-index:3;}
  .platen .bolt{position:absolute;width:7px;height:7px;background:#fff;top:50%;transform:translateY(-50%);}
  .platen .bolt.l{left:8px;} .platen .bolt.r{right:8px;}
  .platen.top{top:24px;transform:translateY(40px);transition:transform .7s cubic-bezier(.3,1.3,.5,1);}
  .platen.bottom{bottom:24px;transform:translateY(-40px);transition:transform .7s cubic-bezier(.3,1.3,.5,1);}
  .pad-core{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:2;}
  .glow{position:absolute;inset:-60px;opacity:0;transition:opacity .7s;pointer-events:none;mix-blend-mode:screen;z-index:1;
    background:radial-gradient(circle at center,rgba(255,233,138,.95),rgba(255,190,70,.45) 35%,transparent 70%);}
  .rays{position:absolute;width:420px;height:420px;left:50%;top:50%;transform:translate(-50%,-50%);opacity:0;transition:opacity .7s;z-index:1;pointer-events:none;
    background:repeating-conic-gradient(from 0deg,rgba(255,240,170,.55) 0deg 5deg,transparent 5deg 17deg);
    -webkit-mask:radial-gradient(circle,#000 26%,transparent 70%);mask:radial-gradient(circle,#000 26%,transparent 70%);
    animation:spin 9s linear infinite;}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}
  .sparks{position:absolute;left:50%;top:50%;width:0;height:0;z-index:4;pointer-events:none;}
  .spk{position:absolute;left:0;top:0;width:8px;height:8px;background:#fff;box-shadow:0 0 8px 2px #ffe98a;margin:-4px;}
  .smk{position:absolute;left:0;top:0;width:26px;height:26px;border-radius:50%;background:#2e2020;margin:-13px;}
  .press-scene.pressing .machine{animation:shake .1s steps(2) 4;}
  @keyframes shake{50%{transform:translateX(3px);}}
  .press-scene.open .platen.top{transform:translateY(-14px);}
  .press-scene.open .platen.bottom{transform:translateY(14px);}
  .press-scene.open.good .glow{opacity:1;}
  .press-scene.open.good .rays{opacity:.9;}
  .press-scene.open.bad .glow{opacity:.6;background:radial-gradient(circle at center,rgba(160,12,12,.9),rgba(70,0,0,.4) 42%,transparent 72%);animation:ompulse 1.1s ease-in-out infinite;}
  @keyframes ompulse{50%{opacity:.28;}}
  .verdict{text-align:center;font-size:18px;color:var(--gold);margin-bottom:4px;letter-spacing:1px;}
  .verdict.bad{color:var(--bad);}
  .verdict.legend{color:var(--gold);text-shadow:0 0 10px #ffcf3a;}
  .total{text-align:center;font-size:15px;color:var(--muted);margin-top:6px;opacity:0;}
  .total.show{opacity:1;}
  .total b{display:inline-block;color:var(--ink);font-size:20px;}
  .total.show b{animation:scorepop .55s cubic-bezier(.2,1.6,.4,1);text-shadow:0 0 10px var(--gold);}
  @keyframes scorepop{0%{transform:scale(0);}65%{transform:scale(1.45);}100%{transform:scale(1);}}
  .screen{display:none;flex-direction:column;height:100%;}
  .screen.active{display:flex;}
  .scroll{overflow-y:auto;flex:1;}
  .scroll::-webkit-scrollbar{width:6px;}
  .scroll::-webkit-scrollbar-thumb{background:#888;}
  .step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:8px;}
  .step-dots .d{width:8px;height:8px;background:#000;border:2px solid #888;}
  .step-dots .d.on{background:#fff;border-color:#fff;}
  .center{text-align:center;}
  #mute-btn{position:absolute;top:16px;right:16px;z-index:60;width:34px;height:34px;background:#161013;border:2px solid #fff;color:#fff;font-size:15px;cursor:pointer;line-height:1;padding:0;}
  #mute-btn:active{transform:translate(1px,1px);}
  /* prologue */
  .prologue-art{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
  .prologue-art svg{display:block;}
  .prologue-art .mat-ic{width:42px;height:42px;border:2px solid #fff;background:#000;display:flex;align-items:center;justify-content:center;}
  .prologue-text{font-size:17px;line-height:2;white-space:pre-wrap;letter-spacing:.5px;margin-top:6px;min-height:6em;}
  .prologue-text .em{color:var(--gold);text-shadow:0 0 6px #ffcf3a;}
  .prologue-text .hot{color:#ff7a4a;text-shadow:0 0 6px #ff5a1a;}
  .prologue-cursor{display:none;color:var(--gold);font-size:16px;animation:blink .6s steps(1) infinite;}
  .prologue-cursor.show{display:inline-block;}
  #prologue-btn{opacity:.45;transition:opacity .4s;}
  #prologue-btn.ready{opacity:1;animation:titlebob 1.4s ease-in-out infinite;}
  /* finished pad image */
  .pad-img{display:block;margin:0 auto;image-rendering:pixelated;width:240px;height:auto;}
  #pad .pad-img,#pad-thanks .pad-img{filter:drop-shadow(0 4px 4px rgba(0,0,0,.5));}
  .pad-legend-wrap{position:relative;display:inline-block;}
  .pad-legend-wrap .pad-img{filter:drop-shadow(0 0 14px #ffe98a) drop-shadow(0 0 26px #ffbe46);animation:legpulse 1.6s ease-in-out infinite;}
  @keyframes legpulse{50%{filter:drop-shadow(0 0 22px #fff2b0) drop-shadow(0 0 40px #ffce5a);}}
  .pad-legend-wrap .ltw{position:absolute;color:#fff;font-size:15px;pointer-events:none;text-shadow:0 0 6px #fff;animation:tw2 1.6s ease-in-out infinite;}
  @media (max-height:700px){p,li{font-size:14px;line-height:1.7;}.slider-block{margin:9px 0;}.pad-stage{height:128px;}.press-scene{height:190px;}.prologue-text{font-size:14px;line-height:1.8;min-height:5em;}.pad-img{width:200px;}}
</style>
</head>
<body>
<div id="stage">
  <button id="mute-btn" onclick="toggleMute()" aria-label="BGMのオンオフ">♪</button>

  <section class="screen active" id="title-screen">
    <div class="win" style="margin-top:auto;">
      <div id="logo"></div>
      <div class="brake-anim" id="brake-anim"><img class="brake-frame" id="brake-frame" alt="ブレーキ"></div>
    </div>
    <div class="win">
      <div class="intro-box" id="intro-box"><p class="intro" id="intro-text"></p></div>
    </div>
    <div class="win" style="margin-bottom:auto;"><ul class="menu" id="title-menu">
      <li data-act="start" class="sel">挑戦する</li>
      <li data-act="survey">急ぎの学生さんは アンケートへ</li>
    </ul></div>
  </section>

  <section class="screen" id="howto-screen">
    <div class="win">
      <h2>プロローグ</h2>
      <div class="prologue-art" id="prologue-art"></div>
    </div>
    <div class="win scroll" style="flex:1;" id="prologue-box">
      <p class="prologue-text" id="prologue-text"></p>
      <span class="prologue-cursor" id="prologue-cursor">▼</span>
    </div>
    <div class="win"><div class="btnrow"><button class="dq primary" id="prologue-btn" onclick="resetGame()">まずは原料を選ぶ</button></div></div>
  </section>

  <section class="screen" id="mat-screen">
    <div class="win">
      <div class="step-dots" id="mat-dots"></div>
      <h2 id="mat-title"></h2>
      <p class="muted" style="font-size:13px;margin-top:4px;" id="mat-room"></p>
    </div>
    <div class="win" style="flex:1;">
      <ul class="cards" id="mat-menu"></ul>
    </div>
    <div class="win"><div class="btnrow">
      <button class="dq" id="mat-back" onclick="matBack()">もどる</button>
      <button class="dq primary" onclick="matChoose()">これにする</button>
    </div></div>
  </section>

  <section class="screen" id="mix-screen">
    <div class="win">
      <h2>組成設計</h2>
      <p class="muted" style="font-size:13px;margin-top:4px;">それぞれの そざいの りょうを きめてくれ</p>
    </div>
    <div class="win scroll" style="flex:1;" id="mix-sliders"></div>
    <div class="win"><div class="btnrow">
      <button class="dq" onclick="go('mat-redo')">もどる</button>
      <button class="dq primary" onclick="go('press')">つぎへ</button>
    </div></div>
  </section>

  <section class="screen" id="press-screen">
    <div class="win">
      <h2>生産条件</h2>
      <p class="muted" style="font-size:13px;margin-top:4px;">品質の安定化をめざし プレス条件をきめてくれ</p>
    </div>
    <div class="win"><div class="radar-wrap" id="press-art"></div></div>
    <div class="win" style="flex:1;">
      <div class="slider-block">
        <div class="slider-head"><span>プレス温度</span><span class="val" id="temp-lbl">中温</span></div>
        <input type="range" id="temp" min="0" max="100" value="50">
        <div class="scale"><span>低温</span><span>高温</span></div>
      </div>
      <div class="slider-block">
        <div class="slider-head"><span>プレス時間</span><span class="val" id="time-lbl">標準</span></div>
        <input type="range" id="time" min="0" max="100" value="50">
        <div class="scale"><span>短時間</span><span>長時間</span></div>
      </div>
      <p class="hint" id="press-hint">おんどと じかんの かけざんで やきが きまる</p>
    </div>
    <div class="win"><div class="btnrow">
      <button class="dq" onclick="go('mix')">もどる</button>
      <button class="dq primary" onclick="startRitual()">プレスする</button>
    </div></div>
  </section>

  <section class="screen" id="ritual-screen">
    <div class="win" style="margin:auto 0;">
      <div class="press-scene" id="press-scene">
        <div class="rays" id="rays"></div>
        <div class="glow" id="glow"></div>
        <div class="machine">
          <div class="platen top"><span class="bolt l"></span><span class="bolt r"></span></div>
          <div class="pad-core" id="pad-core"></div>
          <div class="platen bottom"><span class="bolt l"></span><span class="bolt r"></span></div>
        </div>
        <div class="sparks" id="sparks"></div>
      </div>
      <p class="center" id="ritual-text" style="margin-top:8px;"></p>
    </div>
  </section>

  <section class="screen" id="result-screen">
    <div class="win">
      <div class="verdict" id="verdict"></div>
      <div class="pad-stage"><div id="pad"></div></div>
    </div>
    <div class="win">
      <div class="radar-wrap" id="radar-wrap"></div>
      <div class="total" id="total"></div>
    </div>
    <div class="win scroll" style="flex:1;min-height:150px;">
      <div class="comments" id="comments"></div>
    </div>
    <div class="win"><div class="btnrow">
      <button class="dq primary" onclick="resetGame()">もういちど つくる</button>
      <button class="dq" onclick="go('thanks')">学生さん向け アンケートへ</button>
    </div></div>
  </section>

  <section class="screen" id="thanks-screen">
    <div class="win" style="margin-top:auto;">
      <h2 class="center">ありがとう！</h2>
      <p class="center" style="margin-top:10px;">あそんで くれて ありがとう！</p>
      <p class="center muted" style="margin-top:8px;">まさつざいの おくぶかさを<br>あじわえましたか？</p>
      <p class="center muted" style="margin-top:8px;">よかったら アンケートに<br>こたえて いただけると うれしいです</p>
    </div>
    <div class="win"><div class="pad-stage" style="height:210px;"><div id="pad-thanks"></div></div></div>
    <div class="win" style="margin-bottom:auto;"><div class="btnrow">
      <button class="dq primary" onclick="openSurvey()">アンケートに こたえる</button>
      <button class="dq" onclick="go('title')">タイトルへ</button>
    </div></div>

function tone(f,d,t="square",v=.12,dl=0){const c=ac(),s=c.currentTime+dl,o=c.createOscillator(),g=c.createGain();
  o.type=t;o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(v,s);g.gain.exponentialRampToValueAtTime(.0001,s+d);
  o.connect(g);g.connect(c.destination);o.start(s);o.stop(s+d);}

let bgmGain=null,bgmTimer=null,bgmOn=null,bgmMuted=false;
function ensureBgmGain(){if(!bgmGain){bgmGain=ac().createGain();bgmGain.connect(ac().destination);}bgmGain.gain.value=bgmMuted?0:0.05;}
function bgmNote(freq,start,dur,type,vol){if(!freq)return;const c=ac(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime+start;
  o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(bgmGain);o.start(t);o.stop(t+dur+0.03);}
function playPattern(name){const s=SONGS[name];let t=0.05;
  (s.lead||[]).forEach(([n,b])=>{const d=b*s.tempo;bgmNote(NF[n],t,d*0.9,s.leadType,0.9);t+=d;});const le=t;t=0.05;
  (s.bass||[]).forEach(([n,b])=>{const d=b*s.tempo;bgmNote(NF[n],t,d*0.9,s.bassType,0.5);t+=d;});return Math.max(le,t);}
function scheduleLoop(name){const dur=playPattern(name);bgmTimer=setTimeout(()=>{if(bgmOn===name)scheduleLoop(name);},dur*1000);}
function startBGM(name){try{ac().resume&&ac().resume();}catch(e){}if(bgmOn===name)return;stopBGM();bgmOn=name;ensureBgmGain();scheduleLoop(name);}
function stopBGM(){if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;}bgmOn=null;}
function toggleMute(){bgmMuted=!bgmMuted;if(bgmGain)bgmGain.gain.value=bgmMuted?0:0.05;
  document.getElementById('mute-btn').textContent=bgmMuted?"🔇":"♪";}

/* ----- title brake animation: 3s spin -> 2s brake -> 2s stop, then loop ----- */
let brakeTL=null,brakeIdx=0,brakeTimer=null;
function buildBrakeTL(){
  const tl=[];
  const spinDur=3000,spinStep=130;            // 高速回転 3s（1-3を循環）
  for(let t=0,k=0;t<spinDur;t+=spinStep,k++) tl.push([k%3, spinStep]);
  const brk=[3,4,5,6,7,8], bd=Math.round(2000/brk.length); // ブレーキ 2s（火花4-9）
  brk.forEach(f=>tl.push([f,bd]));
  tl.push([9,360]);tl.push([10,360]);tl.push([11,1280]);   // 停止 2s（10-12、12で静止）
  return tl;
}
function brakeStep(){
  const img=document.getElementById('brake-frame'); if(!img||!brakeTL)return;
  const [f,d]=brakeTL[brakeIdx];
  img.src=BRAKEFRAMES[f];
  brakeIdx=(brakeIdx+1)%brakeTL.length;
  brakeTimer=setTimeout(brakeStep,d);
}
function startBrakeAnim(){
  if(typeof BRAKEFRAMES==="undefined")return;
  if(brakeTimer){clearTimeout(brakeTimer);brakeTimer=null;}
  brakeTL=buildBrakeTL();brakeIdx=0;brakeStep();
}

/* ===================== MIX ===================== */
function mixHint(k,v){if(v===0)return{t:`${k}が ０…！ これでは パッドに ならぬ`,warn:true};
  if(k==="結合材"){if(v<12)return{t:"固める力が よわく まとまりが 足りない"};if(v>70)return{t:"結合材が おおく かたすぎる 気配だ"};}
  if(k==="研削材"){if(v<15)return{t:"まさつが たりないようだ"};if(v>80)return{t:"けずれすぎる きけんが あるぞ"};}
  if(k==="補強材"){if(v>80)return{t:"骨組みは つよいが しずけさが おちるな"};}
  if(k==="潤滑材"){if(v>80)return{t:"しずかだが すべりすぎる 気配があるぞ"};}
  return{t:"ちょうど よい かげんだ"};}
function buildMixSliders(){const wrap=document.getElementById('mix-sliders');wrap.innerHTML="";
  CATS.forEach((cat,i)=>{const o=cat.opts[chosen[i]];const blk=document.createElement('div');blk.className="slider-block";
    blk.innerHTML=`<div class="mix-ic"><span class="mi">${ICON(o.ic,34)}</span><span class="nm${o.leg?' leg':''}">${cat.jp}（${o.name}）</span></div>
      <div class="slider-head"><span class="muted" style="font-size:13px;">りょう</span><span class="val" id="val-${i}">${ratios[i]}</span></div>
      <input type="range" min="0" max="100" value="${ratios[i]}" id="r-${i}"><div class="hint" id="h-${i}"></div>`;
    wrap.appendChild(blk);const inp=blk.querySelector('input');
    const upd=()=>{ratios[i]=+inp.value;document.getElementById(`val-${i}`).textContent=ratios[i];
      const h=mixHint(cat.jp,ratios[i]),he=document.getElementById(`h-${i}`);he.textContent=h.t;he.classList.toggle('warn',!!h.warn);};
    inp.addEventListener('input',()=>{upd();if(+inp.value%10===0)sfx.move();});upd();});}

const tempInp=document.getElementById('temp'),timeInp=document.getElementById('time');
function pressLbl(v,a){return v<33?a[0]:v<67?a[1]:a[2];}
function lerp(a,b,t){return Math.round(a+(b-a)*t);}
function heatColor(t){t/=100;let c;if(t<.5){const k=t/.5;c=[lerp(58,255,k),lerp(111,176,k),lerp(208,46,k)];}else{const k=(t-.5)/.5;c=[255,lerp(176,46,k),46];}return`rgb(${c[0]},${c[1]},${c[2]})`;}
function renderPressArt(){
  const hc=heatColor(temp),hot=temp>62;
  const ang=-90+(time/100)*330,r=15,cx2=186,cy2=62;
  const hx=cx2+r*Math.cos(ang*Math.PI/180),hy=cy2+r*Math.sin(ang*Math.PI/180);
  // pixel clock face (octagon ring) + square ticks
  let ticks="";for(let i=0;i<12;i++){const a=i*30*Math.PI/180,x=cx2+19*Math.cos(a)-1.5,y=cy2+19*Math.sin(a)-1.5;ticks+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="3" height="3" fill="#cfcfcf"/>`;}
  const oct=`<g fill="#1a0808" stroke="#fff" stroke-width="3" stroke-linejoin="miter">
    <polygon points="${cx2-14},${cy2-24} ${cx2+14},${cy2-24} ${cx2+24},${cy2-14} ${cx2+24},${cy2+14} ${cx2+14},${cy2+24} ${cx2-14},${cy2+24} ${cx2-24},${cy2+14} ${cx2-24},${cy2-14}"/></g>`;
  const waves=hot?`<g class="heatwave" fill="${hc}" opacity=".7"><rect x="68" y="28" width="6" height="3"/><rect x="80" y="26" width="6" height="3"/><rect x="92" y="28" width="6" height="3"/><rect x="74" y="22" width="6" height="3"/><rect x="86" y="22" width="6" height="3"/></g>`:"";
  const svg=`<svg viewBox="0 0 220 132" width="220" height="132" shape-rendering="crispEdges">
    <rect x="28" y="106" width="124" height="14" fill="#2a2e36"/><rect x="28" y="106" width="124" height="3" fill="#4a505c"/>
    <rect x="42" y="28" width="14" height="80" fill="#4a505c"/><rect x="42" y="28" width="4" height="80" fill="#6a7180"/>
    <rect x="130" y="28" width="14" height="80" fill="#4a505c"/><rect x="130" y="28" width="4" height="80" fill="#6a7180"/>
    <rect x="36" y="18" width="114" height="16" fill="#565c68"/><rect x="36" y="18" width="114" height="4" fill="#7c838f"/><rect x="36" y="30" width="114" height="4" fill="#2a2e36"/>
    ${waves}
    <rect x="70" y="34" width="46" height="22" fill="#6a7180"/><rect x="70" y="34" width="46" height="4" fill="#8d949e"/><rect x="70" y="52" width="46" height="4" fill="#3a3f4a"/>
    <rect x="62" y="56" width="62" height="9" fill="${hc}"/><rect x="62" y="56" width="62" height="3" fill="#fff" opacity=".35"/>
    <rect x="76" y="65" width="34" height="10" fill="#8a5a32"/><rect x="76" y="65" width="34" height="3" fill="#a8744a"/>
    <rect x="62" y="75" width="62" height="9" fill="${hc}"/><rect x="62" y="81" width="62" height="3" fill="#000" opacity=".3"/>
    <rect x="80" y="84" width="26" height="22" fill="#4a505c"/><rect x="80" y="84" width="6" height="22" fill="#6a7180"/>
    <text x="93" y="128" fill="${hot?'#ff8a3a':'#d8c8c8'}" font-size="11" text-anchor="middle">プレス機</text>
    ${oct}${ticks}
    <rect x="${(cx2-1.5).toFixed(1)}" y="${(cy2-1.5).toFixed(1)}" width="3" height="3" fill="#fff"/>
    <line x1="${cx2}" y1="${cy2}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#f4d24c" stroke-width="3"/>
    <text x="${cx2}" y="100" fill="#d8c8c8" font-size="11" text-anchor="middle">じかん</text>
  </svg>`;
  document.getElementById('press-art').innerHTML=svg;}
function updatePress(){temp=+tempInp.value;time=+timeInp.value;
  document.getElementById('temp-lbl').textContent=pressLbl(temp,["低温","中温","高温"]);
  document.getElementById('time-lbl').textContent=pressLbl(time,["短時間","標準","長時間"]);
  const heat=(temp/100)*(time/100),h=document.getElementById('press-hint');
  if(heat<0.12){h.textContent="やきが あまい… 生焼けに なりそうだ";h.classList.add('warn');}
  else if(heat>0.62){h.textContent="やきすぎ… 劣化しそうな 気配だ";h.classList.add('warn');}
  else{h.textContent="よい やきかげんに ちかいようだ";h.classList.remove('warn');}
  renderPressArt();}
tempInp.addEventListener('input',()=>{updatePress();if(temp%10===0)sfx.move();});
timeInp.addEventListener('input',()=>{updatePress();if(time%10===0)sfx.move();});

/* ===================== SCORING ===================== */
function compute(){const base=42,K=1.95,score=[base,base,base,base,base];
  CATS.forEach((cat,i)=>{const o=cat.opts[chosen[i]],k=ratios[i]/100;o.c.forEach((corr,a)=>{score[a]+=corr*k*K;});});
  if(ratios[2]>80){score[0]+=10;score[1]-=16;score[2]-=10;}
  if(ratios[3]>80){score[2]+=10;score[0]-=16;score[3]-=8;}
  if(ratios[0]>70){score[2]-=10;}
  if(ratios[1]>80){score[1]+=8;score[2]-=8;}
  if(time>80){score[3]-=10;}
  const heat=(temp/100)*(time/100);let firing="normal";
  if(heat<0.12)firing="undercook";else if(heat>0.62)firing="overheat";
  else{const bonus=(1-Math.min(1,Math.abs(heat-0.30)/0.30))*16;for(let a=0;a<5;a++)score[a]+=bonus;}
  const mn=Math.min(...score);if(mn>=44){for(let a=0;a<5;a++)score[a]+=8;}else if(mn>=34){for(let a=0;a<5;a++)score[a]+=4;}
  for(let a=0;a<5;a++)score[a]+=Math.random()*10-5;
  for(let a=0;a<5;a++)score[a]=Math.max(2,Math.min(100,Math.round(score[a])));
  let mixBad=null;
  if(ratios[0]===0)mixBad={axisKill:null,v:"こなごな",cm:"固まらなかった… これは パッドではなく “粉” です"};
  else if(ratios[2]===0)mixBad={axisKill:0,v:"とまらず",cm:"まさつが 足りず まったく 止まれぬ パッドが 生まれた"};
  else if(ratios[1]===0)mixBad={axisKill:1,v:"ほうかい",cm:"骨格が なく ブレーキ時に 崩壊してしまう"};
  else if(ratios[3]===0)mixBad={axisKill:2,v:"なき",cm:"キィィィィィィィィ！ しずけさが まるで ない"};
  const legend=CATS.some((c,i)=>c.opts[chosen[i]].leg);
  return{score,firing,mixBad,heat,legend};}

/* ===================== COMMENTS ===================== */
function summarize(score){const idx=[0,1,2,3,4];
  const top=idx.reduce((a,b)=>score[b]>score[a]?b:a,0),low=idx.reduce((a,b)=>score[b]<score[a]?b:a,0);
  const sH={0:"よく止まる ちからは ばつぐんだ",1:"たいきゅうせいは じゅうぶんだ",2:"とても しずかな しあがりだ",3:"環境への やさしさは ぴかいちだ",4:"コストの やすさが みりょくだ"};
  const sL={0:"だが 止まる力は ものたりないようだ",1:"だが 寿命は みじかいようだ",2:"だが 鳴きが 気になるようだ",3:"だが 環境への ふたんが 大きいようだ",4:"だが コストは かさむようだ"};
  const total=Math.round(score.reduce((a,b)=>a+b,0)/5);
  const tier=total>=72?"まさに 伝説級の できばえだ":total>=60?"なかなかの じつりょくだ":total>=44?"まずまずの できだな":"まだ 改良の よちが あるぞ";
  const lines=[{t:sH[top],cls:"summary"}];
  if(score[low]>=58)lines.push({t:"しかも すべてが 高い水準で まとまっている",cls:"summary"});
  else if(top!==low)lines.push({t:sL[low],cls:"summary"});
  lines.push({t:tier,cls:"summary"});return lines;}
function buildComments(R,finalScore){const out=[];
  CATS.forEach((cat,i)=>out.push({t:cat.opts[chosen[i]].cm,cls:cat.opts[chosen[i]].leg?"leg":""}));
  const mix=[];
  if(ratios[2]>80)mix.push("削りすぎて 耐久が さがってしまったようだ");else if(ratios[2]<15&&ratios[2]>0)mix.push("摩擦が 足りず 制動力が のびないな");
  if(ratios[3]>80)mix.push("静かだが すべりすぎる 気配があるぞ");
  if(ratios[0]<12&&ratios[0]>0)mix.push("固める力が よわく まとまりが 足りない");
  if(ratios[1]>80)mix.push("骨組みは つよいが しずけさが おちたな");
  mix.slice(0,4).forEach(t=>out.push({t,cls:""}));
  if(R.firing==="undercook")out.push({t:"まだ 固まりきっていない… このままでは あぶないぞ",cls:"bad"});
  else if(R.firing==="overheat")out.push({t:"焼きすぎて 材料が 劣化してしまったようだ",cls:"bad"});
  if(R.legend){
    out.push({t:"キラッ…！ 伝説の素材が 真の力を 見せている",cls:"leg"});
    out.push({t:"だが 心せよ… この原料 二度と 手に入らぬ かもしれぬ",cls:"legwarn"});
    out.push({t:"つぎも つくれる ほしょうは どこにも ない…",cls:"legwarn"});
  }
  summarize(finalScore).forEach(l=>out.push(l));
  return out;}

/* ===================== RADAR (animated) ===================== */
function radarPath(score,collapse){const cx=112,cy=120,R=78,n=5;
  let p="";for(let k=0;k<n;k++){const ang=-Math.PI/2+k*2*Math.PI/n,r=collapse?0:R*score[k]/100;
    const x=cx+r*Math.cos(ang),y=cy+r*Math.sin(ang);p+=(k?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}return p+"Z";}
function drawRadar(score){const size=224,cx=112,cy=120,R=78,n=5;
  const ang=k=>-Math.PI/2+k*2*Math.PI/n,pt=(k,r)=>[cx+r*Math.cos(ang(k)),cy+r*Math.sin(ang(k))];let g="";
  [0.25,0.5,0.75,1].forEach(f=>{let p="";for(let k=0;k<n;k++){const[x,y]=pt(k,R*f);p+=(k?"L":"M")+x.toFixed(1)+" "+y.toFixed(1)+" ";}g+=`<path d="${p}Z" fill="none" stroke="#5a4a4a" stroke-width="1"/>`;});
  for(let k=0;k<n;k++){const[x,y]=pt(k,R);g+=`<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#5a4a4a" stroke-width="1"/>`;
    const[lx,ly]=pt(k,R+18);g+=`<text x="${lx}" y="${ly}" fill="#e8d8d8" font-size="11" text-anchor="middle" dominant-baseline="middle">${AXLABEL[AXES[k]]||AXES[k]}</text>`;}
  const d0=radarPath(score,true),d1=radarPath(score,false);
  g+=`<path d="${d0}" fill="rgba(244,210,76,.35)" stroke="#f4d24c" stroke-width="2.5"><animate attributeName="d" dur="0.85s" from="${d0}" to="${d1}" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/></path>`;
  for(let k=0;k<n;k++){const[x,y]=pt(k,R*score[k]/100);g+=`<rect x="${(x-3).toFixed(1)}" y="${(y-3).toFixed(1)}" width="6" height="6" fill="#fff" opacity="0"><animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.3s" fill="freeze"/></rect>`;}
  document.getElementById('radar-wrap').innerHTML=`<svg viewBox="0 0 ${size} ${size+24}" width="${size}" height="${size+24}">${g}</svg>`;}

/* ===================== RITUAL (flashy press) ===================== */
function spawnSparks(){const c=document.getElementById('sparks');c.innerHTML="";
  for(let i=0;i<18;i++){const s=document.createElement('div');s.className="spk";c.appendChild(s);
    const ang=Math.random()*Math.PI*2,dist=55+Math.random()*100;
    s.animate([{transform:'translate(0,0) scale(.4)',opacity:1},{transform:`translate(${Math.cos(ang)*dist}px,${Math.sin(ang)*dist}px) scale(1)`,opacity:0}],
      {duration:900+Math.random()*600,easing:'ease-out',fill:'forwards',delay:i*28});}}
function spawnSmoke(){const c=document.getElementById('sparks');c.innerHTML="";
  for(let i=0;i<8;i++){const s=document.createElement('div');s.className="smk";c.appendChild(s);const x=Math.random()*70-35;
    s.animate([{transform:`translate(${x}px,24px) scale(.6)`,opacity:.7},{transform:`translate(${x*1.6}px,-78px) scale(1.7)`,opacity:0}],
      {duration:1700+Math.random()*700,easing:'ease-out',fill:'forwards',delay:i*120});}}
function startRitual(){sfx.confirm();stopBGM();const R=compute();
  show('ritual');
  const scene=document.getElementById('press-scene'),txt=document.getElementById('ritual-text');
  scene.className='press-scene';document.getElementById('sparks').innerHTML="";
  document.getElementById('pad-core').innerHTML=`<img class="pad-img" style="width:96px;filter:none" src="${PADIMG.normal}" alt="">`;
  txt.textContent="プレス かいし…！";
  setTimeout(()=>{scene.classList.add('pressing');sfx.beep();},500);
  setTimeout(()=>{
    scene.classList.remove('pressing');
    const bad=!!R.mixBad||R.firing!=='normal';
    scene.classList.add('open',bad?'bad':'good');
    if(bad){txt.textContent="なにか おかしいぞ…！";txt.style.color="#ff6060";sfx.bad();spawnSmoke();}
    else{txt.textContent="そざいが かがやきはじめた…！";txt.style.color="#ffe98a";R.legend?sfx.sparkle():sfx.create();spawnSparks();}
  },1150);
  setTimeout(()=>{renderResult(R);show('result');},2700);}

/* ===================== RESULT ===================== */
function renderResult(R){
  const verdict=document.getElementById('verdict');let pattern="normal",vtxt="",vcls="",score=R.score.slice();
  if(R.mixBad){pattern="shatter";vtxt="みかんせい パッド（"+R.mixBad.v+"）";vcls="bad";
    if(R.mixBad.axisKill!==null)score[R.mixBad.axisKill]=2;else score=[6,6,6,6,6];}
  else if(R.firing==="undercook"){pattern="undercook";vtxt="なまやけ パッド";vcls="bad";score=score.map(s=>Math.max(2,Math.round(s*.45)));}
  else if(R.firing==="overheat"){pattern="overheat";vtxt="かねつ れっか パッド";vcls="bad";score=score.map(s=>Math.max(2,Math.round(s*.5)));}
  else if(R.legend){pattern="legend";vtxt="でんせつ パッド";vcls="legend";}
  else{const tot=score.reduce((a,b)=>a+b,0)/5;vtxt=tot>=66?"めいひん パッド":tot>=50?"じょうとう パッド":"ふつう の パッド";}
  lastPattern=pattern;
  startBGM((!R.mixBad&&R.firing==='normal')?'happy':'sad');
  renderPad(pattern,'pad',240);
  verdict.className="verdict"+(vcls?(" "+vcls):"");verdict.textContent=vtxt;
  drawRadar(score);
  const totalEl=document.getElementById('total');totalEl.classList.remove('show');totalEl.innerHTML="";
  const tot=Math.round(score.reduce((a,b)=>a+b,0)/5);
  setTimeout(()=>{totalEl.innerHTML=R.mixBad?"そうごう <b>---</b>":`そうごう <b>${tot}</b> / 100`;totalEl.classList.add('show');if(!R.mixBad)sfx.ding();},950);
  const cbox=document.getElementById('comments');cbox.innerHTML="";
  const lines=R.mixBad?[{t:R.mixBad.cm,cls:"bad"},{t:"そざいは すべて だいじ なのだ",cls:""}]:buildComments(R,score);
  setTimeout(()=>{let li=0;(function next(){
    if(li>=lines.length){const p=document.createElement('p');p.style.marginTop="10px";p.className="muted";p.textContent="また ちょうせん してみるか？";cbox.appendChild(p);return;}
    const p=document.createElement('p');if(lines[li].cls)p.className=lines[li].cls;cbox.appendChild(p);
    typeNarr(p,lines[li].t,()=>{li++;cbox.parentElement.scrollTop=cbox.parentElement.scrollHeight;setTimeout(next,110);});})();},1550);}

/* ===================== RESET / BOOT ===================== */
function resetGame(){matIndex=0;cursor=0;chosen=[null,null,null,null];ratios=[50,50,50,50];temp=50;time=50;
  startBGM('adventure');tempInp.value=50;timeInp.value=50;updatePress();renderMat();go('mat');}
/* ===================== TITLE LOGO + BRAKE ANIM ===================== */
function buildLogo(){
  // Single-line silver wordmark with red 3D extrude (DQ-flavored, not the actual DQ logo)
  const cx=280, baseY=82, word="まさつざい伝説";
  let ext="";
  for(let i=10;i>=1;i--){const t=i/10;const r=Math.round(170*t+55),g=Math.round(14*t+4),b=Math.round(14*t+4);
    ext+=`<text x="${(cx+i*0.9).toFixed(1)}" y="${(baseY+i*0.9).toFixed(1)}" fill="rgb(${r},${g},${b})">${word}</text>`;}
  const svg=`<svg viewBox="0 0 560 112" preserveAspectRatio="xMidYMid meet" font-family="DotGothic16,sans-serif" text-anchor="middle" font-weight="400">
    <defs>
      <linearGradient id="silverface" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff"/><stop offset="0.3" stop-color="#e8eaf0"/>
        <stop offset="0.62" stop-color="#bcc0ca"/><stop offset="1" stop-color="#878c97"/></linearGradient>
    </defs>
    <g font-size="58">${ext}
      <text x="${cx}" y="${baseY}" fill="url(#silverface)" stroke="#3a0000" stroke-width="6.5" paint-order="stroke" stroke-linejoin="round">${word}</text>
      <text x="${cx-2}" y="${baseY-2}" fill="#ffffff" opacity=".4">${word}</text></g>
    <g fill="#f4d24c"><path d="M34 56l3 8 8 3-8 3-3 8-3-8-8-3 8-3z"/><path d="M524 54l2.5 6 6 2.5-6 2.5-2.5 6-2.5-6-6-2.5 6-2.5z"/></g>
  </svg>`;
  document.getElementById('logo').innerHTML=svg;
}
function buildBrake(){
  const cx=150,cy=108,Rg="rotor";
  // rotor: stepped bronze/steel rings + drilled holes + lug nuts (pixel-art, crispEdges)
  let rings="";
  const ringDef=[[78,"#3a2a18"],[74,"#caa14a"],[66,"#8a6a2a"],[58,"#b98f3a"],[40,"#6a4f20"],[30,"#9c7430"],[20,"#5e4418"]];
  ringDef.forEach(([r,c])=>{rings+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${c}"/>`;});
  // drilled holes ring
  let holes="";for(let i=0;i<8;i++){const a=i*Math.PI/4,x=cx+50*Math.cos(a),y=cy+50*Math.sin(a);holes+=`<rect x="${(x-4).toFixed(1)}" y="${(y-4).toFixed(1)}" width="8" height="8" fill="#2a1c10"/>`;}
  // lug nuts
  let lugs="";for(let i=0;i<5;i++){const a=-Math.PI/2+i*2*Math.PI/5,x=cx+24*Math.cos(a),y=cy+24*Math.sin(a);
    lugs+=`<rect x="${(x-4).toFixed(1)}" y="${(y-4).toFixed(1)}" width="8" height="8" fill="#d8dadf"/><rect x="${(x-2).toFixed(1)}" y="${(y-2).toFixed(1)}" width="4" height="4" fill="#7a7d84"/>`;}
  // a wedge marker so spin is visible
  const marker=`<rect x="${cx-3}" y="${cy-74}" width="6" height="20" fill="#fff"/>`;
  const rotor=`<g id="${Rg}"><circle cx="${cx}" cy="${cy}" r="80" fill="#1f1710"/>${rings}${holes}
    <circle cx="${cx}" cy="${cy}" r="12" fill="#3a2a18"/><circle cx="${cx}" cy="${cy}" r="5" fill="#caa14a"/>${lugs}${marker}</g>`;
  // blue caliper bracket (left flavor, like reference) + caliper housing + pads at top
  const blue=`<g shape-rendering="crispEdges"><rect x="18" y="120" width="34" height="40" fill="#1f3aa0"/><rect x="18" y="120" width="34" height="6" fill="#3a5fd0"/><rect x="40" y="96" width="16" height="40" fill="#16307e"/></g>`;
  const caliper=`<g class="caliper-pad" shape-rendering="crispEdges">
      <rect x="118" y="6" width="64" height="22" fill="#8a9099"/><rect x="118" y="6" width="64" height="5" fill="#b6bcc4"/><rect x="118" y="23" width="64" height="5" fill="#4a4f57"/>
      <rect x="126" y="28" width="48" height="10" fill="#7a4a28"/><rect x="126" y="28" width="48" height="3" fill="#9a6238"/>
    </g>
    <g class="stop-spark"><rect x="146" y="34" width="8" height="3" fill="#fff"/><rect x="149" y="31" width="3" height="9" fill="#fff"/><rect x="140" y="33" width="4" height="3" fill="#ffe98a"/><rect x="156" y="33" width="4" height="3" fill="#ffe98a"/></g>`;
  const svg=`<svg viewBox="0 0 240 196" width="240" height="196" shape-rendering="auto">
    <rect x="0" y="0" width="240" height="196" fill="#0a0808"/>
    ${blue}${rotor}${caliper}
  </svg>`;
  document.getElementById('brake-anim').innerHTML=svg;
}
window.addEventListener('load',()=>{buildLogo();renderTitleCursor();startBrakeAnim();startTitleIntro();});
document.addEventListener('keydown',e=>{const a=document.querySelector('.screen.active').id;
  if(a==='mat-screen'){if(e.key==='ArrowDown'){cursor=(cursor+1)%3;paintMatCursor();sfx.move();}
    if(e.key==='ArrowUp'){cursor=(cursor+2)%3;paintMatCursor();sfx.move();}if(e.key==='Enter')matChoose();}});
</script>
